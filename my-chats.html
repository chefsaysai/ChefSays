<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
<title>My Chats – ChefSays</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#FFF8F0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#2D1810}
body{display:flex;flex-direction:column;max-width:430px;margin:0 auto;overflow:hidden}

.hs-appbar{background:#FFF;border-bottom:1.5px solid #FFE0CC;display:flex;align-items:center;justify-content:space-between;padding:7px 20px;flex-shrink:0}
.app-back-btn{width:34px;height:34px;border-radius:50%;background:#FFF;border:1.5px solid #FFE0CC;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;color:#9B7B6E;flex-shrink:0;text-decoration:none}
.hs-brand{display:flex;align-items:center;gap:8px;text-decoration:none}
.hs-brand .w{font-family:Georgia,serif;font-weight:800;font-size:18px;color:#2D1810}
.hs-brand .w span{color:#FF6B35}
.hs-hbtn{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;text-decoration:none;padding:4px}
.hs-hbtn .ic{width:38px;height:38px;border-radius:50%;background:#FFE8DD;display:flex;align-items:center;justify-content:center;font-size:18px}
.hs-hbtn .lb{font-size:10px;font-weight:700;color:#9B7B6E}

.scr{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:16px}

.search-bar{display:flex;align-items:center;gap:10px;background:#FFF;border:1.5px solid #FFE0CC;border-radius:14px;padding:10px 14px;margin-bottom:14px}
.search-bar input{flex:1;border:none;outline:none;font-size:14px;color:#2D1810;background:none;font-family:inherit}
.search-bar .si{font-size:16px;color:#C4956A}

.empty{text-align:center;padding:48px 20px}
.empty .em{font-size:48px;margin-bottom:12px}
.empty .t{font-size:18px;font-weight:800;color:#2D1810;font-family:Georgia,serif;margin-bottom:6px}
.empty .s{font-size:13px;color:#9B7B6E;line-height:1.5}
.empty .cta{display:inline-block;margin-top:20px;background:#FF6B35;color:#FFF;border-radius:14px;padding:13px 24px;font-size:15px;font-weight:800;text-decoration:none}

.auth-gate{text-align:center;padding:60px 24px}
.auth-gate .em{font-size:56px;margin-bottom:14px}
.auth-gate h2{font-family:Georgia,serif;font-size:20px;font-weight:800;color:#2D1810;margin-bottom:8px}
.auth-gate p{font-size:13px;color:#9B7B6E;line-height:1.6;margin-bottom:24px}
.auth-gate button{width:100%;background:#FF6B35;color:#FFF;border:none;border-radius:14px;padding:14px;font-size:16px;font-weight:800;cursor:pointer}
</style>
</head>
<body>

<div class="hs-appbar">
  <a class="app-back-btn" href="home.html" aria-label="Back">&#x2039;</a>
  <div class="hs-brand">
    <svg width="30" height="19" viewBox="0 0 220 130" fill="none"><path d="M34 82 C62 52 101 79 132 43 C155 16 179 11 195 17" stroke="#FF6B35" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/><path d="M35 83 C44 109 88 111 124 60 C98 82 65 91 35 83Z" fill="#FF6B35"/></svg>
    <div class="w" id="appbar-title">Chef<span>Says</span></div>
  </div>
  <a class="hs-hbtn" href="profile.html" aria-label="Profile">
    <div class="ic">👤</div>
    <div class="lb">Profile</div>
  </a>
</div>

<div class="scr" id="main-scr">
  <div class="loading" id="loading-state">Loading…</div>
</div>

<script>
var _sb=null,_user=null,_token=null,_convos=[];

try{
  _sb=supabase.createClient(
    'https://ethcmkxemjsfgvpwygub.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0aGNta3hlbWpzZmd2cHd5Z3ViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NTIwMzYsImV4cCI6MjA5NTAyODAzNn0.Q9_IJ-8AJdEpjrruXXjvcZC7e4mvmDMRleUcbsaI5lk'
  );
}catch(e){}

var _searchTerm='';
// Read filter from sessionStorage (set by profile.html) OR URL param as fallback
var _filterSaved=false;
try{
  if(sessionStorage.getItem('cs_chat_filter')==='saved'){
    _filterSaved=true;
    sessionStorage.removeItem('cs_chat_filter');
  }
}catch(e){}
if(!_filterSaved) _filterSaved=new URLSearchParams(window.location.search).get('filter')==='saved';

if(_filterSaved){
  document.title='Saved Recipes – ChefSays';
  var t=document.getElementById('appbar-title');
  if(t) t.innerHTML='Saved <span>Recipes</span>';
}

function dateLabel(d){
  var now=new Date(),day=new Date(d);
  now.setHours(0,0,0,0);day.setHours(0,0,0,0);
  var diff=Math.round((now-day)/864e5);
  if(diff===0) return 'today';
  if(diff===1) return 'yesterday';
  if(diff<7) return 'earlier';
  return 'older';
}


function convoIcon(type){
  return type==='recipe'?'🍳':(type==='drink'?'🍹':(type==='chef_version'?'👨‍🍳':'💬'));
}

function render(){
  var scr=document.getElementById('main-scr');
  var term=_searchTerm.toLowerCase();
  var filtered=_convos.filter(function(c){
    if(_filterSaved && !(c.saved_recipes&&c.saved_recipes.length)) return false;
    if(!term) return true;
    return (c.question||'').toLowerCase().includes(term)||(c.response||'').toLowerCase().includes(term);
  });

  var titleText=_filterSaved?'Saved Recipes':'Chat History';
  var subText=_filterSaved?'Conversations where you saved a recipe':'Past conversations & recipes you saved';
  var searchPlaceholder=_filterSaved?'Search saved recipes…':'Search your chats…';

  var banner='<div style="background:linear-gradient(135deg,#FF6B35,#FF9148);border-radius:22px;padding:24px 20px;color:#FFF;margin-bottom:14px">'
    +'<div style="font-size:11px;font-weight:700;opacity:.75;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px">Your Kitchen Journal</div>'
    +'<div style="font-size:22px;font-weight:800;font-family:Georgia,serif;margin-bottom:4px">'+titleText+'</div>'
    +'<div style="font-size:13px;opacity:.85">'+subText+'</div>'
    +'</div>';
  var searchBar='<div class="search-bar"><span class="si">🔍</span><input id="search-inp" type="search" placeholder="'+searchPlaceholder+'" value="'+_searchTerm.replace(/"/g,'&quot;')+'" oninput="onSearch(this.value)"/></div>';

  if(!filtered.length){
    var emptyIco=_filterSaved?'📌':'💬';
    var emptyTitle=term?'No results':(_filterSaved?'No saved recipes yet':'No chats yet');
    var emptySub=term?'Try a different search term.':(_filterSaved?'Save a recipe from any chat and it\'ll appear here.':'Start a conversation in ChefSays and it\'ll appear here.');
    var emptyCta=term?'':('<a class="cta" href="home.html">Go cook something →</a>');
    scr.innerHTML=banner+searchBar+'<div class="empty"><div class="em">'+emptyIco+'</div><div class="t">'+emptyTitle+'</div><div class="s">'+emptySub+'</div>'+emptyCta+'</div>';
    if(term){var si=document.getElementById('search-inp');if(si)si.focus();}
    return;
  }

  var groups={today:[],yesterday:[],earlier:[],older:[]};
  filtered.forEach(function(c){ groups[dateLabel(c.created_at)].push(c); });
  var labelMap={today:'Today',yesterday:'Yesterday',earlier:'Earlier this week',older:'Older'};

  var html=banner+searchBar;

  var firstGroup=true;
  ['today','yesterday','earlier','older'].forEach(function(g){
    if(!groups[g].length) return;
    var topMargin=firstGroup?'0':'20px';
    firstGroup=false;
    html+='<div style="margin-top:'+topMargin+';margin-bottom:10px;display:flex;align-items:center;gap:10px">'
      +'<div style="flex:1;height:1px;background:#FFE0CC"></div>'
      +'<div style="font-size:11px;font-weight:800;color:#C4956A;text-transform:uppercase;letter-spacing:1px;white-space:nowrap">'+labelMap[g]+'</div>'
      +'<div style="flex:1;height:1px;background:#FFE0CC"></div>'
      +'</div>';
    groups[g].forEach(function(c){
      var icon=convoIcon(c.type);
      var text=((c.question||'').substring(0,60))+((c.question||'').length>60?'…':'');
      var date=new Date(c.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric'});
      var saved=Array.isArray(c.saved_recipes)?c.saved_recipes:[];
      var hasSaved=saved.length>0;
      var convoJson=JSON.stringify(c).replace(/'/g,'&#39;');

      html+='<div style="margin-bottom:10px">';
      html+='<button style="display:flex;align-items:center;gap:10px;width:100%;background:#FFF;border:1.5px solid #FFE0CC;border-radius:'+(hasSaved?'12px 12px 0 0':'12px')+';padding:12px 14px;text-align:left;cursor:pointer" onclick="openConvo(this)" data-convo=\''+convoJson+'\'>';
      html+='<span style="font-size:20px;flex-shrink:0">'+icon+'</span>';
      html+='<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:#2D1810;line-height:1.4">'+text+'</div>';
      if(hasSaved) html+='<div style="font-size:11px;color:#22C55E;font-weight:600;margin-top:2px">📌 '+saved.length+' recipe'+(saved.length>1?'s':'')+' saved</div>';
      html+='</div>';
      html+='<span style="font-size:11px;color:#C4956A;flex-shrink:0">'+date+'</span>';
      html+='</button>';

      if(hasSaved){
        html+='<div style="border:1.5px solid #22C55E;border-top:none;border-radius:0 0 12px 12px;overflow:hidden">';
        saved.forEach(function(recipe,idx){
          var isLast=idx===saved.length-1;
          html+='<button style="display:flex;align-items:center;gap:10px;width:100%;padding:10px 14px;background:#F0FDF4;border:none;'+(isLast?'':'border-bottom:1px solid #DCFCE7;')+'text-align:left;cursor:pointer" onclick="openConvo(this)" data-convo=\''+convoJson+'\'>';
          html+='<span style="font-size:14px;flex-shrink:0">📌</span>';
          html+='<div style="flex:1;min-width:0;font-size:13px;font-weight:600;color:#166534">'+(recipe.name||'Recipe')+'</div>';
          html+='<span style="font-size:12px;font-weight:700;color:#22C55E;flex-shrink:0">View →</span>';
          html+='</button>';
        });
        html+='</div>';
      }
      html+='</div>';
    });
  });

  scr.innerHTML=html;
  if(term){var si=document.getElementById('search-inp');if(si)si.focus();}
}

function onSearch(v){
  _searchTerm=v;
  render();
}

async function loadChats(){
  var scr=document.getElementById('main-scr');
  try{
    var resp=await fetch('/.netlify/functions/save-conversation',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'get_history',token:_token,data:{type:'conversation'}})
    });
    var d=await resp.json();
    _convos=(d.conversations||[]).map(function(c){
      // Normalise saved_recipes — DB may return a JSON string instead of array
      if(typeof c.saved_recipes==='string'){
        try{c.saved_recipes=JSON.parse(c.saved_recipes);}catch(e){c.saved_recipes=[];}
      }
      if(!Array.isArray(c.saved_recipes)) c.saved_recipes=[];
      return c;
    });
    render();
  }catch(e){
    scr.innerHTML='<div class="empty"><div class="em">⚠️</div><div class="t">Could not load chats</div><div class="s">'+e.message+'</div></div>';
  }
}

function openConvo(el){
  var raw=el.getAttribute('data-convo');
  if(!raw) return;
  try{
    sessionStorage.setItem('cs_open_convo', raw);
    window.location='home.html?openConvo=1';
  }catch(e){}
}

function showAuthGate(){
  document.getElementById('main-scr').innerHTML='<div class="auth-gate"><div class="em">🔒</div><h2>Sign in to see your chats</h2><p>Your conversation history is saved to your account. Sign in to access it from any device.</p><button onclick="window.location=\'home.html\'">Go to ChefSays →</button></div>';
}

document.addEventListener('DOMContentLoaded',async function(){
  if(!_sb){showAuthGate();return;}
  try{
    var s=await _sb.auth.getSession();
    if(s.data&&s.data.session){
      _user=s.data.session.user;
      _token=s.data.session.access_token;
      await loadChats();
    } else {
      showAuthGate();
    }
  }catch(e){showAuthGate();}
});
</script>
</body>
</html>
