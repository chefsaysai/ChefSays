
[build]
  functions = "netlify/functions"
  publish = "."

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL"

# Caching policy to prevent stale files
[[headers]]
  for = "/index.html"
  [headers.values]
    # Never cache the main HTML file, always get the latest version.
    # This rule MUST come before the general /* rule.
    Cache-Control = "no-cache"

[[headers]]
  for = "/*"
  [headers.values]
    # Cache all assets for 1 year, but use a unique hash to break the cache on change
    Cache-Control = "public, max-age=31536000, immutable"

# Inject environment variables into the HTML during build
[[plugins]]
  package = "@netlify/plugin-replace"
  [plugins.inputs]
    # Replace a placeholder in index.html with the actual Supabase Anon Key
    - file = "index.html"
      search = "SUPABASE_ANON_KEY_PLACEHOLDER"
      replace = "{{ env.SUPABASE_ANON_KEY }}"
