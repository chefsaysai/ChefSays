
[build]
  functions = "netlify/functions" # Specifies the directory for serverless functions.
  publish = "." # Specifies the directory to publish, which is the root for this project.

[build.environment]
  NODE_VERSION = "20" # Sets the Node.js version for the build environment.
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL" # Prevents Netlify's secret scanner from flagging the public Supabase URL.

# Caching policy to prevent stale files
[[headers]]
  for = "/index.html"
  [headers.values]
    # Never cache the main HTML file, always get the latest version.
    # This rule MUST come before the general /* rule.
    Cache-Control = "no-cache"

[[headers]]
  for = "/*"
  [headers.values]
    # Cache all assets for 1 year, but use a unique hash to break the cache on change
    Cache-Control = "public, max-age=31536000, immutable"
